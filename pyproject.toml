[project]
name = "core-lens"
dynamic = ["version"]
description = "Query, analyse, and visualise CoreStack's microwatershed and Earth science data through a clean, composable Python API."
readme = "README.md"
authors = [{ name = "Apoorva Kashyap" }, { name = "Kislaya Shrestha" }]
requires-python = ">=3.13"
dependencies = []

[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[tool.hatch.version]
source = "vcs"

[tool.hatch.buuild.hooks.vcs]
version-file = "src/core_lens/_version.py"

[tool.pyright]
extraPaths = ["src"]
venvPath = "."
venv = ".venv"

[dependency-groups]
core = [
    "polars>=1.40.1",
    "pyarrow>=24.0.0",
    "pydantic>=2.13.3",
    "pyproj>=3.7.2",
    "shapely>=2.1.2",
]
spatial = ["geopandas>=1.1.3"]
viz = ["lonboard>=0.16.0", "plotly>=6.7.0"]
stats = ["scipy>=1.17.1", "statsmodels>=0.14.6"]
dev = [
    "faker>=40.21.0",
    "mypy>=1.20.2",
    "pip-audit>=2.10.0",
    "pre-commit>=4.6.0",
    "pytest>=9.0.3",
    "pytest-cov>=7.1.0",
    "python-semantic-release>=10.5.3",
    "ruff>=0.15.12",
    "twine>=6.2.0",
]
types = ["types-geopandas>=1.1.3.20260518", "types-shapely>=2.1.0.20260518"]
docs = [
    "myst-parser>=5.1.0",
    "shibuya>=2026.5.19",
    "sphinx>=9.1.0",
    "sphinx-autoapi>=3.8.0",
    "sphinx-autobuild>=2025.8.25",
    "sphinx-copybutton>=0.5.2",
]

[tool.mypy]
strict = true

[[tool.mypy.overrides]]
module = "tests.*"
disallow_untyped_defs = false
disallow_incomplete_defs = false
